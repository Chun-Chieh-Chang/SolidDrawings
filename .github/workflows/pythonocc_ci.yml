name: PythonOCC CI (Backend Tests)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Backend Pytest with PythonOCC
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          auto-update-conda: true
          python-version: "3.10"
          activate-environment: test-env

      - name: Downgrade Python to 3.10
        run: |
          conda install -y python=3.10.13

      - name: Install Dependencies
        run: |
          mamba install -c conda-forge -y \
            pythonocc-core=7.8.1 \
            pytest \
            fastapi \
            pydantic \
            httpx \
            uvicorn \
            python-multipart

      - name: Verify pythonocc-core
        run: |
          python --version
          python -c "import OCC; print('OCC version:', OCC.__version__)"
          python -c "from OCC.Core.BRepPrimAPI import BRepPrimAPI_MakeBox; box = BRepPrimAPI_MakeBox(10,20,30).Shape(); print('pythonocc-core OK')"

      - name: Run Backend Tests
        working-directory: ./backend
        run: |
          export PYTHONPATH=$(pwd)
          pytest tests/ -v --maxfail=2 --durations=5
