name: PythonOCC CI (Backend Tests)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Backend Pytest with PythonOCC
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Miniforge (Mamba)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          python-version: "3.10"
          activate-environment: test-env
          use-mamba: true
          channels: conda-forge
          channel-priority: true
          conda-remove-defaults: "true"

      - name: Install Dependencies
        run: |
          mamba install -y \
            pythonocc-core \
            pytest \
            fastapi \
            pydantic \
            httpx \
            uvicorn \
            python-multipart
          echo "pythonocc-core installed successfully"

      - name: Verify pythonocc-core
        run: |
          python -c "from OCC.Core.BRepPrimAPI import BRepPrimAPI_MakeBox; box = BRepPrimAPI_MakeBox(10,20,30).Shape(); print('pythonocc-core OK')"

      - name: Run Backend Tests
        working-directory: ./backend
        run: |
          export PYTHONPATH=$(pwd)
          pytest tests/ -v --maxfail=2 --durations=5
