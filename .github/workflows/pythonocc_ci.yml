name: PythonOCC CI (Backend Tests)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Backend Pytest with PythonOCC
    runs-on: ubuntu-22.04
    
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Conda
        uses: actions/cache@v4
        if: false  # Temporarily disable during infrastructure issues (504 Gateway Timeout)
        with:
          path: ~/conda_pkgs_dir
          key: ${{ runner.os }}-conda-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-conda-

      - name: Setup Miniforge (Mamba)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          python-version: "3.10"
          activate-environment: test-env
          use-mamba: true
          channels: conda-forge
          channel-priority: true

      - name: Install Dependencies
        run: |
          mamba install -y \
            pythonocc-core \
            pytest \
            fastapi \
            pydantic \
            httpx \
            uvicorn \
            python-multipart

      - name: Run Backend Tests
        working-directory: ./backend
        run: |
          export PYTHONPATH=$(pwd)
          pytest tests/ -v --maxfail=2 --durations=5
