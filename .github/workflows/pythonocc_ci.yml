name: PythonOCC CI (Backend Tests)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Backend Pytest with PythonOCC
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Miniforge
        run: |
          wget -qO Miniforge.sh https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh
          bash Miniforge.sh -b -p $HOME/miniforge3

      - name: Setup conda
        run: |
          export PATH="$HOME/miniforge3/bin:$PATH"
          conda init bash
          source ~/.bashrc
          conda create -n test-env python=3.10.13 -y
          # Set CONDA_PREFIX so conda activate works in subsequent steps
          echo "CONDA_PREFIX=$HOME/miniforge3/envs/test-env" >> $GITHUB_ENV
          echo "PATH=$HOME/miniforge3/envs/test-env/bin:$HOME/miniforge3/condabin:$HOME/miniforge3/bin:$PATH" >> $GITHUB_ENV

      - name: Install PythonOCC and dependencies
        run: |
          source $HOME/miniforge3/etc/profile.d/conda.sh
          conda activate test-env
          python --version
          conda install -c conda-forge pythonocc-core=7.8.1 pytest fastapi pydantic httpx uvicorn python-multipart scipy -y
          python -c "import OCC; print('OCC loaded')"

      - name: Verify pythonocc-core
        run: |
          source $HOME/miniforge3/etc/profile.d/conda.sh
          conda activate test-env
          python --version
          python -c "from OCC.Core.BRepPrimAPI import BRepPrimAPI_MakeBox; box = BRepPrimAPI_MakeBox(10,20,30).Shape(); print('pythonocc-core OK')"

      - name: Run Backend Tests
        working-directory: ./backend
        run: |
          source $HOME/miniforge3/etc/profile.d/conda.sh
          conda activate test-env
          export PYTHONPATH=$(pwd)
          pytest tests/ -v --maxfail=2 --durations=5
