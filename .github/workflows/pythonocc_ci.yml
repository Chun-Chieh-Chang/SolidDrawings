name: PythonOCC CI (Backend Tests)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Backend Pytest with PythonOCC
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          python-version: "3.10"
          use-mamba: true
          channels: conda-forge
          channel-priority: true
          activate-environment: test-env

      - name: Debug environment
        run: |
          echo "Python: $(which python)"
          echo "Python version: $(python --version)"
          echo "Conda env: $CONDA_DEFAULT_ENV"
          mamba list python
          mamba list pythonocc-core || echo "pythonocc-core NOT installed"

      - name: Install Dependencies
        run: |
          mamba install -c conda-forge -y \
            pythonocc-core=7.8.1 \
            pytest \
            fastapi \
            pydantic \
            httpx \
            uvicorn \
            python-multipart

      - name: Verify pythonocc-core
        run: |
          python -c "from OCC.Core.BRepPrimAPI import BRepPrimAPI_MakeBox; box = BRepPrimAPI_MakeBox(10,20,30).Shape(); print('pythonocc-core OK')"

      - name: Run Backend Tests
        working-directory: ./backend
        run: |
          export PYTHONPATH=$(pwd)
          pytest tests/ -v --maxfail=2 --durations=5
