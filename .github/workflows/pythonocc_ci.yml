name: PythonOCC CI (Backend Tests)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Backend Pytest with PythonOCC
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install pytest fastapi pydantic httpx uvicorn python-multipart
          # Install pythonocc-core from conda-forge using pip-compatible wheel
          pip install pythonocc-core

      - name: Verify pythonocc-core Installation
        run: |
          python -c "from OCC.Core.BRepPrimAPI import BRepPrimAPI_MakeBox; print('pythonocc-core OK')"

      - name: Run Backend Tests
        working-directory: ./backend
        run: |
          export PYTHONPATH=$(pwd)
          pytest tests/ -v --maxfail=2 --durations=5
